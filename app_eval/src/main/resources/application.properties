spring.application.name=app

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:shopwise;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 console
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# Comptes de demonstration. Surcharger ces valeurs par variables d'environnement.
shopwise.security.admin-username=${SHOPWISE_ADMIN_USERNAME:admin}
shopwise.security.admin-password=${SHOPWISE_ADMIN_PASSWORD:admin123}
shopwise.security.merchant-username=${SHOPWISE_MERCHANT_USERNAME:merchant}
shopwise.security.merchant-password=${SHOPWISE_MERCHANT_PASSWORD:merchant123}
shopwise.security.token-ttl=PT8H
